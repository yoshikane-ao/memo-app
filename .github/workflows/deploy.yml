name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          sed -i 's/\r$//' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << EOF
            set -euo pipefail

            echo "== whoami =="
            whoami
            echo "== hostname =="
            hostname

            echo "== app dir =="
            cd "${{ secrets.APP_DIR }}"
            pwd

            echo "== git sync =="
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "== docker status =="
            sudo systemctl start docker || true
            sudo systemctl is-active docker
            sudo docker version

            echo "== deploy db =="
            sudo docker compose up -d --build db

            echo "== migrate =="
            sudo docker compose run --build --rm api npx prisma migrate deploy

            echo "== deploy app =="
            sudo docker compose up -d --build api web

            echo "== cleanup =="
            sudo docker image prune -af || true
            sudo docker builder prune -af || true

            echo "== ps =="
            sudo docker compose ps
          EOF