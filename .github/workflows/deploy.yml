name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          sed -i 's/\r$//' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            set -euo pipefail
            trap 'echo "== compose ps =="; sudo docker compose ps || true; echo "== db logs =="; sudo docker compose logs db --tail=100 || true; echo "== api logs =="; sudo docker compose logs api --tail=100 || true; echo "== web logs =="; sudo docker compose logs web --tail=100 || true' ERR

            echo "== whoami =="
            whoami
            echo "== hostname =="
            hostname

            echo "== app dir =="
            cd "${{ secrets.APP_DIR }}"
            pwd

            echo "== git sync =="
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "== remove stale compose env =="
            rm -f .env

            echo "== docker status =="
            sudo systemctl start docker || true
            sudo systemctl is-active docker
            sudo docker version

            echo "== compose config check =="
            sudo docker compose config

            echo "== stop old containers =="
            sudo docker compose down || true

            echo "== build and start db =="
            sudo docker compose up -d --build db

            echo "== wait for db health =="
            for attempt in $(seq 1 30); do
              DB_STATUS=$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' memo_db 2>/dev/null || echo "missing")
              echo "db health: ${DB_STATUS}"
              if [ "${DB_STATUS}" = "healthy" ]; then
                break
              fi
              sleep 2
            done
            [ "${DB_STATUS}" = "healthy" ]

            echo "== migrate =="
            sudo docker compose run -T --build --rm api npx prisma migrate deploy < /dev/null

            echo "== deploy app =="
            sudo docker compose up -d --build api web

            echo "== wait for api health =="
            for attempt in $(seq 1 30); do
              API_STATUS=$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' memo_api 2>/dev/null || echo "missing")
              echo "api health: ${API_STATUS}"
              if [ "${API_STATUS}" = "healthy" ]; then
                break
              fi
              sleep 2
            done
            [ "${API_STATUS}" = "healthy" ]

            echo "== ps =="
            sudo docker compose ps

            echo "== api logs =="
            sudo docker compose logs api --tail=100 || true

            echo "== web logs =="
            sudo docker compose logs web --tail=100 || true

            echo "== cleanup =="
            sudo docker image prune -af || true
            sudo docker builder prune -af || true
          EOF