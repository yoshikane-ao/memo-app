name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Lint (ESLint)
        run: npm run lint

      - name: Validate backend
        working-directory: backend
        run: |
          npm run check:architecture
          npm run test:api
          npm run build

      - name: Validate frontend
        working-directory: frontend
        run: |
          npm run check:architecture
          npm run test:unit
          npm run test:e2e
          npm run build

  build-push:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/memo-app-api:latest
            ghcr.io/${{ github.repository_owner }}/memo-app-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/memo-app-web:latest
            ghcr.io/${{ github.repository_owner }}/memo-app-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          sed -i 's/\r$//' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2 (pull from GHCR)
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            set -euo pipefail
            trap 'echo "== compose ps =="; sudo docker compose ps || true; echo "== db logs =="; sudo docker compose logs db --tail=100 || true; echo "== api logs =="; sudo docker compose logs api --tail=100 || true; echo "== web logs =="; sudo docker compose logs web --tail=100 || true' ERR

            echo "== whoami =="
            whoami
            echo "== hostname =="
            hostname

            echo "== app dir =="
            cd "${{ secrets.APP_DIR }}"
            pwd

            echo "== git sync =="
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "== write compose env from GitHub Secrets =="
            umask 077
            printf 'POSTGRES_USER=%s\nPOSTGRES_PASSWORD=%s\nPOSTGRES_DB=%s\n' \
              '${{ secrets.POSTGRES_USER }}' \
              '${{ secrets.POSTGRES_PASSWORD }}' \
              '${{ secrets.POSTGRES_DB }}' > .env
            chmod 600 .env

            echo "== load env for shell use =="
            set -a; . ./.env; set +a

            echo "== docker status =="
            sudo systemctl start docker || true
            sudo systemctl is-active docker
            sudo docker version

            echo "== compose config check =="
            sudo docker compose config

            echo "== pull images from GHCR =="
            sudo docker compose pull api web

            echo "== stop old containers =="
            sudo docker compose down || true

            echo "== start db =="
            sudo docker compose up -d db

            echo "== wait for db health =="
            for attempt in $(seq 1 30); do
              DB_STATUS=$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' memo_db 2>/dev/null || echo "missing")
              echo "db health: ${DB_STATUS}"
              if [ "${DB_STATUS}" = "healthy" ]; then
                break
              fi
              sleep 2
            done
            [ "${DB_STATUS}" = "healthy" ]

            echo "== cleanup failed migration records =="
            sudo docker compose exec -T db psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -c "DELETE FROM _prisma_migrations WHERE finished_at IS NULL;" </dev/null || true

            echo "== migrate =="
            sudo docker compose run -T --rm api npx prisma migrate deploy < /dev/null

            echo "== deploy app =="
            sudo docker compose up -d api web

            echo "== wait for api health =="
            for attempt in $(seq 1 30); do
              API_STATUS=$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' memo_api 2>/dev/null || echo "missing")
              echo "api health: ${API_STATUS}"
              if [ "${API_STATUS}" = "healthy" ]; then
                break
              fi
              sleep 2
            done
            [ "${API_STATUS}" = "healthy" ]

            echo "== ps =="
            sudo docker compose ps

            echo "== api logs =="
            sudo docker compose logs api --tail=100 || true

            echo "== web logs =="
            sudo docker compose logs web --tail=100 || true

            echo "== cleanup unused images =="
            sudo docker image prune -af || true
          EOF
