version: "3.9"

services:
  db:
    image: postgres:16
    container_name: memo_db
    restart: always
    environment:
      POSTGRES_USER: memo_db
      POSTGRES_PASSWORD: tanjoubi0622
      POSTGRES_DB: memo_db
    ports:
      - "5432:5432"
    volumes:
      - memo_db_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: memo_api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://memo_db:tanjoubi0622@db:5432/memo_db?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}

  web:
    build:
      context: ./frontend
    container_name: memo_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  memo_db_data:
