services:
  db:
    image: postgres:16
    container_name: memo_db
    restart: always
    # EC2 911MiB RAM 環境で OOM killer が無秩序に走らないよう 3 サービス合計で
    # 600MiB 弱に収める。本番サイズに合わせて調整可。mem_limit は hard cap、
    # mem_reservation は scheduler のヒントとして使われる soft floor。
    mem_limit: 320m
    mem_reservation: 192m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
    volumes:
      - memo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  api:
    image: ghcr.io/yoshikane-ao/memo-app-api:latest
    build: ./backend
    container_name: memo_api
    restart: always
    mem_limit: 192m
    mem_reservation: 128m
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      DEMO_EMAIL: ${DEMO_EMAIL:-}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-}
      DEMO_DISPLAY_NAME: ${DEMO_DISPLAY_NAME:-デモユーザー}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  web:
    image: ghcr.io/yoshikane-ao/memo-app-web:latest
    build:
      context: ./frontend
    container_name: memo_web
    restart: always
    mem_limit: 64m
    mem_reservation: 32m
    ports:
      - '80:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # nginx:alpine に含まれる busybox wget で自身の 80 番を叩いて疎通確認する。
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  memo_db_data:
