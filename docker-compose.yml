version: "3.9"

services:
  db:
    image: postgres:16
    container_name: memo_db
    restart: always
    environment:
      POSTGRES_USER: memo_db
      POSTGRES_PASSWORD: tanjoubi0622
      POSTGRES_DB: memo_db
    ports:
      - "5432:5432"
    volumes:
      - memo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memo_db -d memo_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  api:
    build: ./backend
    container_name: memo_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://memo_db:tanjoubi0622@db:5432/memo_db?schema=public
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  web:
    build:
      context: ./frontend
    container_name: memo_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  memo_db_data:
